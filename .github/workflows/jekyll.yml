name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Install Node tools
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Build search index (Pagefind)
        run: npm run build:search

      # - name: Inspect built site
      #   run: |
      #     pwd
      #     ls -la
      #     echo "--- _site ---"
      #     find ./_site -maxdepth 3 | sort | head -200

      - name: Check deployed artifact
        run: |
          forbidden=(
            "_site/README.md"
            "_site/LICENSE"
            "_site/Rakefile"
            "_site/Gemfile"
            "_site/Gemfile.lock"
            "_site/package.json"
            "_site/package-lock.json"
            "_site/initpost.sh"
            "_site/Dockerfile"
          )

          found=0
          for file in "${forbidden[@]}"; do
            if [ -e "$file" ]; then
              echo "::error::$file should not be deployed"
              found=1
            fi
          done

          exit "$found"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

