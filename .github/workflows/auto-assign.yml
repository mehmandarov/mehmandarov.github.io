name: Auto-assign PRs

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Assign PR to repository owner
        # repository_owner keeps this generic — no hardcoded username
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          OWNER: ${{ github.repository_owner }}
        run: gh pr edit "$PR_URL" --add-assignee "$OWNER"
