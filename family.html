---
layout: default
permalink: /family/index.html
title: Projects
---
{% include header.html %}

<section class="list" data-pagefind-ignore>
    {% for post in site.posts %}
        {% if post.category == 'project' %}
            <div class="item {% if post.star == true %}star{% endif %}">
                <a class="url" href="{{ post.url | relative_url }}">
                    <aside><time datetime="{{ post.date | date: '%d-%m-%Y' }}">{{ post.date | date: '%b %d %Y' }}</time></aside>
                    {{ post.jemoji }}<h3 class="title">{{ post.title }}</h3>
                </a>
            </div>
        {% endif %}
    {% endfor %}
</section>

{% include footer.html %}
