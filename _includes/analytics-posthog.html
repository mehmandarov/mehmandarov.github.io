    posthog.init('{{ site.analytics-posthog }}', {
        api_host: 'https://eu.i.posthog.com',
        defaults: '2026-01-30',
        person_profiles: 'identified_only',
        opt_out_capturing_by_default: true /* no tracking until user consents */
    });

    /* Show consent banner if user hasn't decided yet */
    (function() {
        var CONSENT_KEY = 'analytics_consent';

        function setConsent(value) {
            localStorage.setItem(CONSENT_KEY, value);
            document.getElementById('ph-consent-banner').style.display = 'none';
            if (value === 'yes') {
                posthog.opt_in_capturing();
            }
        }

        function initBanner() {
            var stored = localStorage.getItem(CONSENT_KEY);
            if (stored === 'yes') {
                posthog.opt_in_capturing();
                return;
            }
            if (stored === 'no') { return; } /* user declined, stay opted out */

            // No decision yet — show the banner
            var banner = document.createElement('div');
            banner.id = 'ph-consent-banner';
            banner.innerHTML = [
                '<div style="position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;color:#f0f0f0;',
                'padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;',
                'gap:1rem;z-index:9999;font-family:sans-serif;font-size:0.875rem;flex-wrap:wrap;">',
                '<span>This site uses analytics to understand how content is used. No personal data is stored.</span>',
                '<div style="display:flex;gap:0.5rem;flex-shrink:0;">',
                '<button onclick="window.__phConsent(\'yes\')" style="background:#4e7fff;color:#fff;border:none;',
                'padding:0.4rem 1rem;border-radius:4px;cursor:pointer;font-size:0.875rem;">Accept</button>',
                '<button onclick="window.__phConsent(\'no\')" style="background:transparent;color:#aaa;border:1px solid #555;',
                'padding:0.4rem 1rem;border-radius:4px;cursor:pointer;font-size:0.875rem;">Decline</button>',
                '</div></div>'
            ].join('');
            document.body.appendChild(banner);
        }

        window.__phConsent = setConsent;

        // Run after DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initBanner);
        } else {
            initBanner();
        }
    })();
</script>
