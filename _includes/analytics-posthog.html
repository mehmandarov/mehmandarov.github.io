    posthog.init('{{ site.analytics-posthog }}', {
        api_host: 'https://eu.i.posthog.com',
        defaults: '2026-01-30',
        person_profiles: 'identified_only',
        opt_out_capturing_by_default: true /* no tracking until user consents */
    });

    /* Show consent banner if user hasn't decided yet */
    (function() {
        var CONSENT_KEY = 'analytics_consent';

        function setConsent(value) {
            localStorage.setItem(CONSENT_KEY, value);
            document.getElementById('ph-consent-banner').style.display = 'none';
            if (value === 'yes') {
                posthog.opt_in_capturing();
            } else {
                posthog.opt_out_capturing();
            }
        }

        function showBanner() {
            var existing = document.getElementById('ph-consent-banner');
            if (existing) { existing.remove(); }
            var banner = document.createElement('div');
            banner.id = 'ph-consent-banner';
            banner.innerHTML = [
                '<div class="consent-overlay">',
                '<div class="consent-card">',
                '<div class="consent-title">&#127850; Cookie Settings</div>',
                '<p class="consent-text">',
                'This site uses privacy-friendly analytics (PostHog) to understand how content is used. ',
                'No personal data is stored. You can change your choice anytime in the footer.</p>',
                '<div class="consent-buttons">',
                '<button onclick="window.__phConsent(\'yes\')" class="consent-btn consent-btn-accept">Accept</button>',
                '<button onclick="window.__phConsent(\'no\')" class="consent-btn consent-btn-decline">Decline</button>',
                '</div></div></div>'
            ].join('');
            document.body.appendChild(banner);
        }

        function initBanner() {
            var stored = localStorage.getItem(CONSENT_KEY);
            if (stored === 'yes') {
                posthog.opt_in_capturing();
                return;
            }
            if (stored === 'no') { return; }
            showBanner();
        }

        window.__phConsent = setConsent;
        window.__phShowConsent = showBanner;

        /* Run after DOM is ready */
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initBanner);
        } else {
            initBanner();
        }
    })();
</script>
